      - heading "Our Maison" [level=1] [ref=f8e47]:
        - text: Our
        - emphasis [ref=f8e48]: Maison
      - paragraph [ref=f8e49]: A Paris house built on restraint, craft and longevity — designing fewer pieces, and making them to be kept.
    - generic [ref=f8e51]:
      - generic [ref=f8e53]: Our Philosophy
      - paragraph [ref=f8e54]:
        - text: We design for the wardrobe that lasts — pieces meant to be worn for years,
        - emphasis [ref=f8e55]: not seasons.
      - paragraph [ref=f8e56]: "Maison Arden began with a simple frustration: that true quality had quietly disappeared behind logos and fast turnover. We make considered garments — in small numbers, from honest materials, by people we know by name."
      - generic [ref=f8e57]:
        - text: Hélène Arden
        - generic [ref=f8e58]: Founder & Creative Director
      - generic [ref=f8e59]:
        - generic [ref=f8e60]: Fewer, finer
        - generic [ref=f8e62]: Made to be kept
        - generic [ref=f8e64]: Honest by default
    - generic [ref=f8e67]:
      - generic [ref=f8e69]:
        - img "An Atelier Arden coat" [ref=f8e70]
        - generic [ref=f8e71]: The Atelier · Paris VIᵉ
      - generic [ref=f8e72]:
        - generic [ref=f8e73]:
          - generic [ref=f8e74]: Our Beginning
          - heading "From a single coat." [level=2] [ref=f8e75]
        - paragraph [ref=f8e76]: In 2014, founder Hélène Arden returned to Paris with a single cashmere coat she'd spent two years perfecting. There was no marketing, no sale — just a waiting list of people who understood what they were holding.
        - paragraph [ref=f8e77]: A decade later, that same principle guides everything we make. Every piece begins as a problem worth solving, refined until nothing more can be removed, then made in runs small enough to keep our standards uncompromised.
        - generic [ref=f8e78]:
          - text: Hélène Arden
          - generic [ref=f8e79]: Founder & Creative Director
        - link "Explore the Collection" [ref=f8e80] [cursor=pointer]:
          - /url: /shop
          - text: Explore the Collection
          - img [ref=f8e81]
    - generic [ref=f8e83]:
      - generic [ref=f8e84]:
        - generic [ref=f8e85]: What we stand for
        - heading "Four quiet principles." [level=2] [ref=f8e86]:
          - text: Four quiet
          - emphasis [ref=f8e87]: principles.
        - paragraph [ref=f8e88]: They sound simple. Holding to them is the hard part — and the point.
      - generic [ref=f8e89]:
        - generic [ref=f8e90]:
          - generic: "01"
          - img [ref=f8e92]
          - heading "Sourcing" [level=3] [ref=f8e96]
          - paragraph [ref=f8e98]: We partner directly with family-run mills in northern Italy, Belgium, and Scotland, where centuries of textile heritage inform every thread. Each fibre is chosen for its provenance, resilience, and tactile quality — not convenience or cost.
          - generic [ref=f8e99]: Tracing Origin
        - generic [ref=f8e100]:
          - generic: "02"
          - img [ref=f8e102]
          - heading "Craft" [level=3] [ref=f8e105]
          - paragraph [ref=f8e107]: Every garment passes through the hands of no fewer than twelve artisans in our Paris atelier. We deliberately slow the process — sewing, pressing, and finishing by hand — because we believe the quality of attention is visible in the final garment.
          - generic [ref=f8e108]: Made By Hand
        - generic [ref=f8e109]:
          - generic: "03"
          - img [ref=f8e111]
          - heading "Longevity" [level=3] [ref=f8e113]
          - paragraph [ref=f8e115]: We design against obsolescence. Our silhouettes are considered across seasons; our cuts calibrated to outlive trend cycles. When you invest in a Maison Arden piece, you enter a lifetime relationship — including complimentary repairs for the life of the garment.
          - generic [ref=f8e116]: Designed to Last
        - generic [ref=f8e117]:
          - generic: "04"
          - img [ref=f8e119]
          - heading "Responsibility" [level=3] [ref=f8e121]
          - paragraph [ref=f8e123]: Small-batch production means we never overproduce. We offset our carbon footprint through certified reforestation, use natural dyeing processes wherever possible, and publish an annual transparency report — because quiet luxury should extend to the planet.
          - generic [ref=f8e124]: Measured Impact
