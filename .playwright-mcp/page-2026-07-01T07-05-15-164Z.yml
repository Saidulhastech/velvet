          - heading "The slow way, on purpose." [level=2] [ref=f8e161]
        - paragraph [ref=f8e162]: A single Atelier coat passes through eleven pairs of hands over three weeks. Nothing about it is fast, because nothing good ever is — and we keep production within a day's travel of Paris, so we can stand in the room where our clothes are made.
