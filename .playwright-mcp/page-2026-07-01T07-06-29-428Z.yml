        - generic [ref=f9e257]:
          - generic [ref=f9e258]:
            - button "How long does delivery take?" [ref=f9e259] [cursor=pointer]:
              - generic [ref=f9e261]: How long does delivery take?
            - paragraph [ref=f9e263]: Standard courier arrives within 3–5 business days and Express Air within 1–2. Orders placed before 2pm CET ship the same day, with complimentary carbon-neutral delivery worldwide.
          - generic [ref=f9e264]:
            - button "What is your returns policy?" [ref=f9e265] [cursor=pointer]:
              - generic [ref=f9e267]: What is your returns policy?
            - paragraph [ref=f9e269]: We offer complimentary returns within 30 days of delivery. Items should be unworn with original tags. Refunds are issued to your original payment method within 5 business days of receipt.
          - generic [ref=f9e270]:
            - button "How do I choose the right size?" [ref=f9e271] [cursor=pointer]:
              - generic [ref=f9e273]: How do I choose the right size?
            - paragraph [ref=f9e275]: Each product page includes a detailed size guide with measurements. For tailoring or in-between sizes, our specialists are happy to advise — just select "Product & Sizing" in the form above.
          - generic [ref=f9e276]:
            - button "Can I book a private appointment?" [ref=f9e277] [cursor=pointer]:
              - generic [ref=f9e279]: Can I book a private appointment?
            - paragraph [ref=f9e281]: Yes — private styling appointments are available at all boutiques. Select "Private Appointment" in the form above or call your nearest atelier directly.
          - generic [ref=f9e282]:
            - button "How should I care for my pieces?" [ref=f9e283] [cursor=pointer]:
              - generic [ref=f9e285]: How should I care for my pieces?
            - paragraph [ref=f9e287]: Each garment includes detailed care guidance. In general, store knitwear folded, steam to refresh, and use a specialist dry cleaner for tailoring. Complimentary lifetime repairs are included on every piece.
          - generic [ref=f9e288]:
            - button "Do you offer gift wrapping?" [ref=f9e289] [cursor=pointer]:
              - generic [ref=f9e291]: Do you offer gift wrapping?
            - paragraph [ref=f9e293]: Yes. Add complimentary gift wrapping at checkout — ivory tissue, a satin ribbon and a hand-written message card, presented in our signature box.
          - generic [ref=f9e294]:
            - button "Can I amend or cancel my order?" [ref=f9e295] [cursor=pointer]:
              - generic [ref=f9e297]: Can I amend or cancel my order?
            - paragraph [ref=f9e299]: Orders can be amended or cancelled within one hour of placing them. Contact client care as soon as possible and we'll do everything we can before your order enters fulfilment.
